name: Deploy to GTX Server

on:
  push:
    branches:
      - master  # This triggers the sync whenever you push to master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Sync files to Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 8822
          # This ensures it uses SFTP (which your server requires)
          protocol: sftp
          # local-dir stays as ./ because your GitHub repo starts at the gamemode level
          local-dir: ./

          # server-dir is the specific path where the gamemode lives on GTX
          server-dir: garrysmod/gamemodes/zombiesurvival/
          delete-destination-extra-files: true
