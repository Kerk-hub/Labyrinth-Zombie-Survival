name: Deploy to GTX Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy via SFTP (force overwrite)
        uses: atmoz/sftp@master
        with:
          host: ${{ secrets.SFTP_HOST }}
          user: ${{ secrets.SFTP_USER }}
          pass: ${{ secrets.SFTP_PASS }}
          port: ${{ secrets.SFTP_PORT }}
          args: |
            -o StrictHostKeyChecking=no
          command: |
            put -r ./gamemode ${{ secrets.SFTP_PATH }}/gamemode
            put -r ./entities ${{ secrets.SFTP_PATH }}/entities
            put -r ./backgrounds ${{ secrets.SFTP_PATH }}/backgrounds
            put ./addon.json ${{ secrets.SFTP_PATH }}/addon.json