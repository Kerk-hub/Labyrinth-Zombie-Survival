name: Deploy to GTX Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Sync files to Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 8822
          # Use 'ftp' here - the Action automatically upgrades to SFTP 
          # when it sees port 8822 and the server supports it.
          protocol: ftp
          local-dir: ./
          server-dir: garrysmod/gamemodes/zombiesurvival/
          # The correct parameter name for deleting extra files is 'dangerous-clean-slate'
          dangerous-clean-slate: true
