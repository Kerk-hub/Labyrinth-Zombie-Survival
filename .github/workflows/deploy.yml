name: Deploy to GTX Server

on:
  push:
    branches:
      - master  # This triggers the sync whenever you push to master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Sync files to Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 8822
          # This ensures it uses SFTP (which your server requires)
          protocol: sftp
          # Set local-dir to '.' to sync everything, or 'garrysmod/' if your code is in a subfolder
          local-dir: ./
          # IMPORTANT: server-dir is where the files go on the server. 
          # Usually leave blank for root, or use 'garrysmod/addons/my_addon/'
          server-dir: ./
