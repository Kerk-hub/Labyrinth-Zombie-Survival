name: Deploy to GTX Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SFTP Deploy
        uses: pressidium/sftp-deploy@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          port: 8822
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          # The source folder in GitHub
          local_dir: ./
          # The destination on the server
          remote_dir: garrysmod/gamemodes/zombiesurvival/
          # This handles the 'delete' functionality
          delete_extra: false
          # This tells the action not to try and run forbidden 'ls' commands
          sync_mode: 'unison'
