name: Deploy to GTX Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Sync files to Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 8822
          protocol: sftp
          local-dir: ./
          # No leading slash here—helps avoid permission issues
          server-dir: garrysmod/gamemodes/zombiesurvival/
          # Set to false first to test the connection
          dangerous-clean-slate: false
